<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a0033">
    <meta name="description" content="spwashi.work - Interactive portfolio with stunning shader effects">
    <title>spwashi.work - Portfolio</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: #fff;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            touch-action: none;
        }
        
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0033 0%, #2d0a5e 50%, #4a0e8f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff00ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #fff;
            opacity: 0.8;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }
        
        #content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        
        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }
        
        @keyframes gradient-shift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }
        
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }
        
        .tap-hint {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.6);
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        #fps {
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
        }
        
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="loader"></div>
        <div class="loading-text">Loading Experience...</div>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div id="content">
        <h1>spwashi.work</h1>
        <div class="subtitle">Interactive Portfolio</div>
        <div class="tap-hint">✨ Tap anywhere to interact ✨</div>
    </div>
    
    <div id="fps"></div>
    
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
        
        // Canvas and WebGL setup
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        
        if (!gl) {
            alert('WebGL not supported in your browser');
        }
        
        // Resize canvas to full screen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Vertex shader
        const vertexShaderSource = `
            attribute vec2 a_position;
            void main() {
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;
        
        // Fragment shader with impressive effects
        const fragmentShaderSource = `
            precision highp float;
            
            uniform vec2 u_resolution;
            uniform float u_time;
            uniform vec2 u_interactions[10];
            uniform float u_interactionTimes[10];
            uniform int u_interactionCount;
            
            // Noise function for organic movement
            float noise(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }
            
            float smoothNoise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                
                float a = noise(i);
                float b = noise(i + vec2(1.0, 0.0));
                float c = noise(i + vec2(0.0, 1.0));
                float d = noise(i + vec2(1.0, 1.0));
                
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }
            
            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                float frequency = 1.0;
                
                for(int i = 0; i < 5; i++) {
                    value += amplitude * smoothNoise(p * frequency);
                    amplitude *= 0.5;
                    frequency *= 2.0;
                }
                
                return value;
            }
            
            vec3 palette(float t) {
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.263, 0.416, 0.557);
                
                return a + b * cos(6.28318 * (c * t + d));
            }
            
            void main() {
                vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution) / min(u_resolution.y, u_resolution.x);
                vec2 uv0 = uv;
                vec3 finalColor = vec3(0.0);
                
                // Base animated pattern
                float time = u_time * 0.3;
                
                for(float i = 0.0; i < 3.0; i++) {
                    uv = fract(uv * 1.5) - 0.5;
                    
                    float d = length(uv) * exp(-length(uv0));
                    float pattern = fbm(uv0 * 3.0 + time + i);
                    
                    vec3 col = palette(length(uv0) + i * 0.4 + time * 0.4 + pattern);
                    
                    d = sin(d * 8.0 + time + pattern * 6.28318) / 8.0;
                    d = abs(d);
                    d = pow(0.01 / d, 1.2);
                    
                    finalColor += col * d;
                }
                
                // Add interaction ripples
                for(int i = 0; i < 10; i++) {
                    if(i >= u_interactionCount) break;
                    
                    float timeSince = u_time - u_interactionTimes[i];
                    if(timeSince < 2.0 && timeSince >= 0.0) {
                        vec2 interactionUV = (u_interactions[i] - 0.5 * u_resolution) / min(u_resolution.y, u_resolution.x);
                        float dist = length(uv0 - interactionUV);
                        
                        float ripple = sin(dist * 20.0 - timeSince * 10.0) * exp(-timeSince * 2.0) * exp(-dist * 3.0);
                        float glow = exp(-dist * 5.0) * exp(-timeSince * 3.0);
                        
                        vec3 rippleColor = palette(timeSince * 2.0 + float(i) * 0.1);
                        finalColor += rippleColor * (abs(ripple) * 0.5 + glow * 0.8);
                    }
                }
                
                // Vignette effect
                float vignette = 1.0 - length(uv0) * 0.3;
                finalColor *= vignette;
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        // Compile shader
        function compileShader(source, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            
            return shader;
        }
        
        // Create program
        const vertexShader = compileShader(vertexShaderSource, gl.VERTEX_SHADER);
        const fragmentShader = compileShader(fragmentShaderSource, gl.FRAGMENT_SHADER);
        
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error('Program linking error:', gl.getProgramInfoLog(program));
        }
        
        gl.useProgram(program);
        
        // Set up geometry (full screen quad)
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1
        ]);
        
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
        
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
        
        // Get uniform locations
        const resolutionLocation = gl.getUniformLocation(program, 'u_resolution');
        const timeLocation = gl.getUniformLocation(program, 'u_time');
        const interactionsLocation = gl.getUniformLocation(program, 'u_interactions');
        const interactionTimesLocation = gl.getUniformLocation(program, 'u_interactionTimes');
        const interactionCountLocation = gl.getUniformLocation(program, 'u_interactionCount');
        
        // Interaction tracking
        const maxInteractions = 10;
        const interactions = [];
        
        function addInteraction(x, y, time) {
            interactions.push({ x, y, time });
            if (interactions.length > maxInteractions) {
                interactions.shift();
            }
        }
        
        // Handle touch and mouse interactions
        function handleInteraction(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = rect.height - ((e.clientY || e.touches[0].clientY) - rect.top);
            addInteraction(x, y, performance.now() / 1000);
        }
        
        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', handleInteraction);
        canvas.addEventListener('touchmove', handleInteraction);
        
        // FPS counter
        let frameCount = 0;
        let lastTime = performance.now();
        const fpsElement = document.getElementById('fps');
        
        function updateFPS() {
            frameCount++;
            const currentTime = performance.now();
            if (currentTime >= lastTime + 1000) {
                fpsElement.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = currentTime;
            }
        }
        
        // Render loop
        function render(time) {
            time *= 0.001; // Convert to seconds
            
            gl.uniform2f(resolutionLocation, canvas.width, canvas.height);
            gl.uniform1f(timeLocation, time);
            
            // Pass interactions to shader
            const interactionArray = new Float32Array(maxInteractions * 2);
            const timeArray = new Float32Array(maxInteractions);
            
            for (let i = 0; i < Math.min(interactions.length, maxInteractions); i++) {
                interactionArray[i * 2] = interactions[i].x;
                interactionArray[i * 2 + 1] = interactions[i].y;
                timeArray[i] = interactions[i].time;
            }
            
            gl.uniform2fv(interactionsLocation, interactionArray);
            gl.uniform1fv(interactionTimesLocation, timeArray);
            gl.uniform1i(interactionCountLocation, Math.min(interactions.length, maxInteractions));
            
            // Clear old interactions
            const currentTime = time;
            while (interactions.length > 0 && currentTime - interactions[0].time > 2.0) {
                interactions.shift();
            }
            
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            updateFPS();
            requestAnimationFrame(render);
        }
        
        // Preloader
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').classList.add('hidden');
                requestAnimationFrame(render);
            }, 1000);
        });
    </script>
</body>
</html>
